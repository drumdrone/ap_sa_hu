# =============================================================================
# Netlify Configuration — Staging & Production Environment
# =============================================================================
#
# PRODUCTION:  main branch    → https://apsahu.netlify.app
# STAGING:     staging branch → https://staging--apsahu.netlify.app
#
# =============================================================================

# --- Production build (main branch) -----------------------------------------
[build]
  command = "bash scripts/netlify-build.sh"
  publish = ".next"

# Next.js on Netlify requires the Next.js Runtime plugin
[[plugins]]
  package = "@netlify/plugin-nextjs"

# --- Branch deploys ----------------------------------------------------------
# Netlify automatically deploys these branches to subdomains:
#   staging → https://staging--apsahu.netlify.app
[build.environment]
  # Default environment (production)
  NODE_VERSION = "20"

# --- Staging branch-specific overrides ---------------------------------------
[context.staging]
  command = "bash scripts/netlify-build.sh"
  [context.staging.environment]
    # Set NEXT_PUBLIC_CONVEX_URL in Netlify UI per-site.
    NEXT_PUBLIC_ENVIRONMENT = "staging"

# --- Production branch-specific overrides ------------------------------------
[context.production]
  command = "bash scripts/netlify-build.sh"
  [context.production.environment]
    # Set NEXT_PUBLIC_CONVEX_URL in Netlify UI per-site.
    NEXT_PUBLIC_ENVIRONMENT = "production"

# --- Headers -----------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
