# =============================================================================
# Netlify Configuration
# =============================================================================
#
# Workflow:  feature branch → PR → Deploy Preview → test → merge do main
#
# ⚠️ Citlivé klíče (CONVEX_DEPLOY_KEY, RESEND_API_KEY apod.) NEPATŘÍ sem!
#    Nastavte je v Netlify Dashboard → Site Settings → Environment variables.
#
# =============================================================================

[build]
  command = "npx convex deploy --cmd 'npm run build'"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_CONVEX_URL = "https://efficient-basilisk-904.eu-west-1.convex.cloud"

# Next.js on Netlify requires the Next.js Runtime plugin
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Deploy Previews (PR branches) use the same build command and same Convex DB
[context.deploy-preview]
  command = "npx convex deploy --cmd 'npm run build'"

# --- Headers -----------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
